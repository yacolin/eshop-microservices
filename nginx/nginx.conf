user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker 默认 DNS 地址，用于动态解析服务名
    resolver 127.0.0.11 valid=30s;

    # 提取公共 Proxy 配置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;
        server_name localhost;

        # --- User Service ---
        # 匹配 /user/ 开头的请求
        location /user/ {
            # 结尾加 / 表示：转发时去掉 "/user/"，
            # 访问 /user/v1/users -> 转发给后端 /v1/users
            proxy_pass http://user-service:8080/; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Order Service ---
        location /order/ {
            proxy_pass http://order-service:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Inventory Service ---
        location /inventory/ {
            # 修正：端口 8080，结尾带 /
            proxy_pass http://inventory-service:8080/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- 自动补全末尾斜杠 (防止用户少输入一个 / 导致 404) ---
        location /user { return 301 $scheme://$http_host$uri/; }
        location /order { return 301 $scheme://$http_host$uri/; }
        location /inventory { return 301 $scheme://$http_host$uri/; }
    }
}