user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# events block is required for the main config
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # resolve service names via Docker DNS at request time
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        # Order service
        location /order/ {
            proxy_pass http://order-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Inventory service
        location /inventory/ {
            proxy_pass http://inventory-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check endpoints
        location /order/health {
            proxy_pass http://order-service:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /inventory/health {
            proxy_pass http://inventory-service:8080/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}